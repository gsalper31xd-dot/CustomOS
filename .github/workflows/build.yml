name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Generate stable debug keystore
        run: |
          keytool -genkeypair -v -keystore app/debug.keystore \
            -storepass android -keypass android \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=CustomOS, OU=Dev, O=CustomOS, L=City, S=State, C=TR"
      - name: Download real gradle wrapper jar
        run: |
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: CustomOS-debug
          path: app/build/outputs/apk/debug/app-debug.apk
